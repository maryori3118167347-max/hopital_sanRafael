services:
  db:
    image: postgres:15
    container_name: postgres_san_rafael_db
    restart: always
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: microservices_hospital_san_rafael2_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  devices_service:
    build: ./devices_service
    container_name: devices_service
    ports:
      - "5002:5002"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:0000@db:5432/san_rafael_db
      SECRET_KEY: super_secret_key

  locations_service:
    build: ./locations_service
    container_name: locations_service
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:0000@db:5432/san_rafael_db
      SECRET_KEY: super_secret_key

  roles_service:
    build: ./roles_service
    container_name: roles_service
    ports:
      - "5005:5005"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:0000@db:5432/san_rafael_db
      SECRET_KEY: super_secret_key    

  users_service:
    build: ./users_service
    container_name: users_service
    ports:
      - "5004:5004"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:0000@db:5432/san_rafael_db
      SECRET_KEY: super_secret_key

  auth_service:
    build: ./auth_service_san_Rafael
    container_name: auth_service
    ports:
      - "5003:5003"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:0000@db:5432/san_rafael_db
      SECRET_KEY: super_secret_key


  gateway:
    build: ./gateway_san_Rafael
    container_name: gateway
    ports:
      - "5000:5000"
    depends_on:
      auth_service:
        condition: service_started
      devices_service:
        condition: service_started
      locations_service:
        condition: service_started
      roles_service:
        condition: service_started
      users_service:
        condition: service_started
    environment:
      SECRET_KEY: super_secret_key
volumes:
  postgres_data: